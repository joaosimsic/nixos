# Hyprlock - Lock Screen Configuration
# Retro Orange Monochrome Theme

$orange = rgb(ff6600)
$orange_dim = rgb(4a2800)
$black = rgb(0d0500)
$font = JetBrains Mono

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    color = $black
    blur_passes = 0
}

input-field {
    monitor =
    size = 300, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $orange_dim
    inner_color = $black
    font_color = $orange
    fade_on_empty = false
    placeholder_text = <i>PASSWORD</i>
    hide_input = false
    rounding = 0
    check_color = $orange
    fail_color = rgb(ff3300)
    fail_text = <i>ACCESS DENIED</i>
    fail_transition = 300
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $orange
    font_size = 64
    font_family = $font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = $orange_dim
    font_size = 16
    font_family = $font
    position = 0, 30
    halign = center
    valign = center
}

label {
    monitor =
    text = [ LOCKED ]
    color = $orange
    font_size = 12
    font_family = $font
    position = 0, -140
    halign = center
    valign = center
}
